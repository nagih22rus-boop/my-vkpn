name: Auto Build on VK-TURN Update

on:
  # Run manually
  workflow_dispatch:
  # Run daily at 6 AM UTC to check for updates
  schedule:
    - cron: '0 6 * * *'
  # Also trigger on repository dispatch from vk-turn-proxy
  repository_dispatch:
    types: [vk-turn-proxy-updated]

jobs:
  check-vkturn-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Check latest vk-turn-proxy release
        id: check
        run: |
          # Get latest release from vk-turn-proxy
          VK_VERSION=$(curl -sL https://api.github.com/repos/cacggghp/vk-turn-proxy/releases/latest 2>/dev/null | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "Latest vk-turn-proxy version: $VK_VERSION"
          
          # Always build on workflow_dispatch (manual trigger)
          echo "should_build=true" >> $GITHUB_OUTPUT
          echo "new_version=$VK_VERSION" >> $GITHUB_OUTPUT
          echo "Manual trigger - building APK"

      - name: Save current version
        if: steps.check.outputs.should_build == 'true'
        run: |
          echo "${{ steps.check.outputs.new_version }}" > vkturn_version.txt

      - name: Copy version to Flutter assets
        run: |
          mkdir -p assets
          if [ -f "vkturn_version.txt" ]; then
            cp vkturn_version.txt assets/
          else
            # If not building, still copy current version
            echo "${{ steps.check.outputs.new_version }}" > assets/vkturn_version.txt
          fi

  build-android:
    needs: check-vkturn-update
    if: needs.check-vkturn-update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Fetch latest vk-turn-proxy binary
        run: |
          # Create directory if not exists
          mkdir -p android/app/src/main/jniLibs/arm64-v8a
          
          # Download the latest Android binary (try arm64 first, then arm)
          curl -sL https://github.com/cacggghp/vk-turn-proxy/releases/latest/download/client-android-arm64 \
            -o android/app/src/main/jniLibs/arm64-v8a/libvkturn.so || \
          curl -sL https://github.com/cacggghp/vk-turn-proxy/releases/latest/download/client-android-arm \
            -o android/app/src/main/jniLibs/arm64-v8a/libvkturn.so
          
          # Verify download
          ls -la android/app/src/main/jniLibs/arm64-v8a/libvkturn.so
          
          # Save version for reference
          VK_VERSION=$(curl -sL https://api.github.com/repos/cacggghp/vk-turn-proxy/releases/latest 2>/dev/null | grep -o '"tag_name": *"[^"]*"' | head -1 | cut -d'"' -f4)
          echo "$VK_VERSION" > vkturn_version.txt
          echo "Downloaded vk-turn-proxy $VK_VERSION"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'

      - name: Get dependencies
        run: |
          # Retry with exponential backoff
          for i in 1 2 3 4 5; do
            echo "Attempt $i..."
            if flutter pub get; then
              echo "Success!"
              exit 0
            fi
            echo "Attempt $i failed, waiting..."
            sleep $((i * 10))
          done
          echo "All attempts failed"
          exit 1

      - name: Build APK
        run: flutter build apk --debug

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vkturn-${{ needs.check-vkturn-update.outputs.new_version }}
          name: VK-TURN Proxy Update ${{ needs.check-vkturn-update.outputs.new_version }}
          body: |
            Auto-built APK with latest vk-turn-proxy binary.
            
            Binary version: ${{ needs.check-vkturn-update.outputs.new_version }}
            
            ### Changes
            This release includes the latest vk-turn-proxy binary update.
          files: build/app/outputs/flutter-apk/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: vkpn-apk
          path: build/app/outputs/flutter-apk/app-release.apk