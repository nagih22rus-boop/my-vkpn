name: Auto Build on VK-TURN Update

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'
  repository_dispatch:
    types: [vk-turn-proxy-updated]

env:
  VKTURN_REPO: cacggghp/vk-turn-proxy

jobs:
  check-vkturn-update:
    runs-on: ubuntu-latest
    outputs:
      should_build: ${{ steps.check.outputs.should_build }}
      new_version: ${{ steps.check.outputs.new_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check latest vk-turn-proxy release
        id: check
        run: |
          VK_VERSION=$(curl -sL "https://api.github.com/repos/${{ env.VKTURN_REPO }}/releases/latest" \
            | grep -o '"tag_name": *"[^"]*"' \
            | head -1 \
            | cut -d'"' -f4)
          echo "Latest vk-turn-proxy version: $VK_VERSION"

          if [ -z "$VK_VERSION" ]; then
            echo "Failed to fetch latest version"
            echo "should_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Read current version from the Flutter asset (authoritative source)
          if [ -f "assets/vkturn_version.txt" ]; then
            CURRENT_VERSION=$(cat assets/vkturn_version.txt)
          else
            CURRENT_VERSION=""
          fi

          echo "Current tracked version: $CURRENT_VERSION"

          if [ "$VK_VERSION" = "$CURRENT_VERSION" ]; then
            echo "No update needed (already at $VK_VERSION)"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "Update available: $CURRENT_VERSION -> $VK_VERSION"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

          echo "new_version=$VK_VERSION" >> $GITHUB_OUTPUT

  build-android:
    needs: check-vkturn-update
    if: needs.check-vkturn-update.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Single script updates binary + both version files (Flutter + Android assets)
      - name: Fetch and update vk-turn binary
        run: bash scripts/fetch_vkturn_binaries.sh

      - name: Commit updated files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add android/app/src/main/jniLibs/arm64-v8a/libvkturn.so
          git add assets/vkturn_version.txt
          git add android/app/src/main/assets/vkturn_version.txt
          git diff --cached --stat
          git commit -m "Update vk-turn-proxy binary to ${{ needs.check-vkturn-update.outputs.new_version }}"
          git push

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --debug

      - name: Rename APK
        run: |
          VERSION="${{ needs.check-vkturn-update.outputs.new_version }}"
          cp build/app/outputs/flutter-apk/app-debug.apk "build/app/outputs/flutter-apk/my-vkpn-${VERSION}.apk"
          ls -la build/app/outputs/flutter-apk/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: vkturn-${{ needs.check-vkturn-update.outputs.new_version }}
          name: VK-TURN Proxy Update ${{ needs.check-vkturn-update.outputs.new_version }}
          body: |
            Auto-built APK with latest vk-turn-proxy binary.

            Binary version: ${{ needs.check-vkturn-update.outputs.new_version }}

            ### Changes
            This release includes the latest vk-turn-proxy binary update.
          files: build/app/outputs/flutter-apk/my-vkpn-${{ needs.check-vkturn-update.outputs.new_version }}.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
